<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Promo Bot — Painel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;450;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #111827;
    --bg-elev: #0d131f;
    --card: #1f2937;
    --card-2: #232f3f;
    --border: #2c3a4d;
    --border-soft: #283546;
    --accent: #6366f1;
    --accent-hover: #5457e6;
    --accent-soft: rgba(99, 102, 241, 0.14);
    --text: #ffffff;
    --muted: #9ca3af;
    --muted-2: #6b7587;
    --danger: #ef4444;
    --danger-soft: rgba(239, 68, 68, 0.12);
    --green: #34d399;
    --radius: 10px;
    --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 8px 24px -12px rgba(0,0,0,0.6);
    --font: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: "Geist Mono", ui-monospace, SFMono-Regular, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em;
  }

  #root { min-height: 100%; }

  ::selection { background: var(--accent-soft); }

  /* ---------- Buttons ---------- */
  .btn {
    font-family: var(--font);
    font-size: 13.5px;
    font-weight: 500;
    letter-spacing: -0.01em;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 0 14px;
    height: 38px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    cursor: pointer;
    transition: background .14s ease, border-color .14s ease, color .14s ease, opacity .14s ease;
    white-space: nowrap;
    user-select: none;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-secondary { background: var(--card); color: var(--text); border-color: var(--border); }
  .btn-secondary:hover { background: var(--card-2); border-color: #38485d; }
  .btn-ghost-danger {
    background: transparent; color: var(--muted); border-color: transparent;
    height: 32px; width: 32px; padding: 0; border-radius: 7px;
  }
  .btn-ghost-danger:hover { background: var(--danger-soft); color: var(--danger); }

  /* ---------- Inputs ---------- */
  .field-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 7px;
    letter-spacing: -0.01em;
  }
  .field-hint {
    font-size: 12.5px;
    color: var(--muted-2);
    margin-top: 6px;
    line-height: 1.45;
  }
  .input {
    width: 100%;
    height: 40px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 0 13px;
    transition: border-color .14s ease, box-shadow .14s ease;
    letter-spacing: -0.01em;
  }
  .input::placeholder { color: var(--muted-2); }
  .input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .input.mono { font-family: var(--mono); font-size: 13px; }

  /* ---------- Cards ---------- */
  .card {
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  /* ================= LOGIN ================= */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background:
      radial-gradient(900px 500px at 50% -10%, rgba(99,102,241,0.10), transparent 70%),
      var(--bg);
  }
  .login-card {
    width: 100%;
    max-width: 380px;
    padding: 32px 30px 30px;
  }
  .login-head { text-align: center; margin-bottom: 26px; }
  .logo-badge {
    width: 46px; height: 46px;
    border-radius: 12px;
    background: var(--accent);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    box-shadow: 0 6px 18px -6px rgba(99,102,241,0.7);
  }
  .login-title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  .login-sub { font-size: 13.5px; color: var(--muted); margin-top: 4px; }
  .login-form { display: flex; flex-direction: column; gap: 16px; }
  .login-form .btn-primary { height: 40px; margin-top: 4px; }

  /* ================= APP SHELL ================= */
  .topbar {
    height: 56px;
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 22px;
    position: sticky;
    top: 0;
    background: rgba(17,24,39,0.82);
    backdrop-filter: blur(10px);
    z-index: 20;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .logo-badge { width: 28px; height: 28px; border-radius: 8px; margin: 0; box-shadow: none; }
  .brand-name { font-weight: 600; font-size: 14.5px; letter-spacing: -0.02em; }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 12.5px; color: var(--muted);
    background: var(--card); border: 1px solid var(--border-soft);
    padding: 5px 11px; border-radius: 99px;
  }
  .dot { width: 7px; height: 7px; border-radius: 99px; background: var(--green); box-shadow: 0 0 0 3px rgba(52,211,153,0.18); }
  .api-chip { font-family: var(--mono); font-size: 12px; color: var(--muted-2); }
  .link-btn {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-family: var(--font); font-size: 13px; padding: 6px 8px; border-radius: 6px;
    transition: color .14s, background .14s; letter-spacing: -0.01em;
  }
  .link-btn:hover { color: var(--text); background: var(--card); }

  .tabs {
    display: flex;
    gap: 2px;
    padding: 0 22px;
    border-bottom: 1px solid var(--border-soft);
    position: sticky;
    top: 56px;
    background: rgba(17,24,39,0.82);
    backdrop-filter: blur(10px);
    z-index: 19;
  }
  .tab {
    background: none; border: none; cursor: pointer;
    font-family: var(--font); font-size: 13.5px; font-weight: 500;
    color: var(--muted); padding: 13px 14px 14px;
    position: relative; letter-spacing: -0.01em;
    transition: color .14s ease;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); }
  .tab.active::after {
    content: ""; position: absolute; left: 8px; right: 8px; bottom: -1px;
    height: 2px; background: var(--accent); border-radius: 2px 2px 0 0;
  }

  .page { max-width: 1000px; margin: 0 auto; padding: 30px 22px 80px; }
  .page-head { margin-bottom: 22px; }
  .page-title { font-size: 19px; font-weight: 600; letter-spacing: -0.02em; }
  .page-desc { font-size: 13.5px; color: var(--muted); margin-top: 3px; }

  /* ---------- Table ---------- */
  .table-card { overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    font-size: 11.5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted-2);
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-soft);
    background: rgba(255,255,255,0.012);
  }
  tbody td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border-soft);
    font-size: 13.5px;
    vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background .12s ease; }
  tbody tr:hover { background: rgba(255,255,255,0.018); }
  .prod-name { font-weight: 500; color: var(--text); }
  .prod-id { font-family: var(--mono); font-size: 11.5px; color: var(--muted-2); margin-top: 2px; }
  .price { font-family: var(--mono); font-size: 13px; }
  .price-min { color: var(--muted); }
  .num-col { text-align: right; }
  .drop-badge {
    display: inline-flex; align-items: center;
    font-family: var(--mono); font-size: 12px; font-weight: 500;
    padding: 3px 8px; border-radius: 6px;
    background: rgba(52,211,153,0.12); color: var(--green);
  }
  .drop-badge.flat { background: var(--card-2); color: var(--muted); }
  .muted-cell { color: var(--muted); }
  .actions-col { text-align: right; }

  .empty {
    padding: 64px 24px;
    text-align: center;
  }
  .empty-icon {
    width: 46px; height: 46px; border-radius: 12px;
    background: var(--card-2); border: 1px solid var(--border-soft);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--muted-2); margin-bottom: 14px;
  }
  .empty-title { font-size: 14.5px; font-weight: 500; color: var(--text); }
  .empty-sub { font-size: 13px; color: var(--muted); margin-top: 5px; }

  .count-pill {
    font-size: 12px; color: var(--muted); font-family: var(--mono);
    background: var(--card); border: 1px solid var(--border-soft);
    padding: 2px 9px; border-radius: 99px; margin-left: 10px;
    vertical-align: middle;
  }

  /* ---------- Forms (add + settings) ---------- */
  .form-card { padding: 26px; }
  .add-card { padding: 26px; max-width: 620px; }
  .settings-grid { display: flex; flex-direction: column; gap: 0; }
  .setting-row {
    display: grid;
    grid-template-columns: 1fr 220px;
    gap: 24px;
    padding: 22px 0;
    border-bottom: 1px solid var(--border-soft);
    align-items: start;
  }
  .setting-row:first-child { padding-top: 0; }
  .setting-meta .field-label { margin-bottom: 4px; }
  .setting-control { padding-top: 1px; }
  .num-input-wrap { position: relative; }
  .num-suffix {
    position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
    font-size: 12.5px; color: var(--muted-2); pointer-events: none;
    font-family: var(--mono);
  }

  /* ---------- Tags ---------- */
  .tags-box {
    grid-column: 1 / -1;
    margin-top: 4px;
  }
  .tags-wrap {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 12px;
  }
  .tag {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--accent-soft); color: #c7c9ff;
    border: 1px solid rgba(99,102,241,0.3);
    font-size: 12.5px; font-weight: 500;
    padding: 5px 7px 5px 11px; border-radius: 7px;
  }
  .tag button {
    background: none; border: none; cursor: pointer; color: #9a9ef0;
    width: 16px; height: 16px; border-radius: 4px; display: inline-flex;
    align-items: center; justify-content: center; transition: background .12s, color .12s;
  }
  .tag button:hover { background: rgba(99,102,241,0.25); color: #fff; }
  .tag-add-row { display: flex; gap: 8px; max-width: 380px; }
  .no-tags { font-size: 12.5px; color: var(--muted-2); margin-bottom: 12px; }

  .form-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 26px; padding-top: 22px; border-top: 1px solid var(--border-soft);
  }
  .save-hint { font-size: 12.5px; color: var(--muted-2); }
  .saved-flash { color: var(--green); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px);
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); font-size: 13px; padding: 10px 16px; border-radius: 9px;
    box-shadow: var(--shadow); display: flex; align-items: center; gap: 9px;
    opacity: 0; pointer-events: none; transition: opacity .2s ease, transform .2s ease;
    z-index: 50;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  svg { display: block; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="app.jsx"></script>
</body>
</html>
